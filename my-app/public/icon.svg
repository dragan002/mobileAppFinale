<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="atomGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="coreGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DB2777;stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#0F172A"/>

  <!-- Outer ring (habit progress circle) -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#atomGradient)" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#atomGradient)" stroke-width="8"
          stroke-dasharray="942" stroke-dashoffset="235" stroke-linecap="round"/>

  <!-- Atomic nucleus (center core) -->
  <circle cx="256" cy="256" r="35" fill="url(#coreGradient)"/>

  <!-- Electron orbits -->
  <!-- Orbit 1 - horizontal -->
  <ellipse cx="256" cy="256" rx="90" ry="50" fill="none" stroke="url(#atomGradient)" stroke-width="3" opacity="0.6"/>

  <!-- Orbit 2 - rotated 60 degrees -->
  <g transform="rotate(60 256 256)">
    <ellipse cx="256" cy="256" rx="90" ry="50" fill="none" stroke="url(#atomGradient)" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Orbit 3 - rotated 120 degrees -->
  <g transform="rotate(120 256 256)">
    <ellipse cx="256" cy="256" rx="90" ry="50" fill="none" stroke="url(#atomGradient)" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- Electrons on orbits -->
  <!-- Electron 1 -->
  <circle cx="346" cy="256" r="8" fill="url(#atomGradient)"/>

  <!-- Electron 2 -->
  <g transform="rotate(120 256 256)">
    <circle cx="346" cy="256" r="8" fill="url(#atomGradient)"/>
  </g>

  <!-- Electron 3 -->
  <g transform="rotate(240 256 256)">
    <circle cx="346" cy="256" r="8" fill="url(#atomGradient)"/>
  </g>

  <!-- Center dot glow -->
  <circle cx="256" cy="256" r="20" fill="#EC4899" opacity="0.2" filter="blur(8px)"/>

  <!-- Checkmark accent (small, top right of nucleus) -->
  <g transform="translate(300, 220)">
    <circle cx="0" cy="0" r="18" fill="#10B981" opacity="0.9"/>
    <path d="M -6 0 L -2 4 L 6 -4" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>